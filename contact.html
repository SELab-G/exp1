<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - MyConf 2025</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
    </nav>
    <div class="page-container">
        <h1>Contact Us</h1>
        <form id="contactForm">
            <input type="text" placeholder="Your Name" required><br>
            <input type="email" placeholder="Your Email" required><br>
            <textarea rows="5" placeholder="Your Message" required></textarea><br>
            <button type="submit">Send Message</button>
        </form>
        <p>Email: info@myconf2025.com | Phone: +98 21 12345678</p>
    </div>
    <footer>
        <p>&copy; 2025 MyConf Team</p>
    </footer>
    <script>
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Your message has been sent (demo).');
        });
    </script>
</body>
</html>
